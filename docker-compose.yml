services:
  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace backend"
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/ai-job-copilot
      JWT_SECRET: super_secure_jwt_secret_key_2026
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongo

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace frontend"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      BACKEND_URL: http://backend:5000
    depends_on:
      - backend

volumes:
  mongo-data:
