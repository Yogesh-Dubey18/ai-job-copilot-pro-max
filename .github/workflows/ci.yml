name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            frontend/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('frontend/src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}-
      - run: npm ci
      - run: npm run build --workspace backend
      - run: npm run typecheck --workspace frontend
      - run: npm run test --workspace frontend
      - run: npm run build --workspace frontend
